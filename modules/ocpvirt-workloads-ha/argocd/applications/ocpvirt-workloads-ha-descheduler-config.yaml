apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocpvirt-workloads-ha-descheduler-config
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:ravishar-rh/operator-config-files.git
    targetRevision: main
    path: modules/ocpvirt-workloads-ha/overlays/config-descheduler
  # Cluster-scoped KubeDescheduler — do not set destination.namespace.
  destination:
    server: https://kubernetes.default.svc
  dependsOn:
    - name: ocpvirt-workloads-ha-rbac
    - name: ocpvirt-workloads-ha-install
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: -1
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: operator.openshift.io
      kind: KubeDescheduler
      jqPathExpressions:
        - .status
